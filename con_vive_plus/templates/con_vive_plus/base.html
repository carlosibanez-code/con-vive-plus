<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Con Vive Plus</title>
    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #222;
        }

        header {
            background: linear-gradient(90deg, #1f3c88, #2d5bb3);
            color: white;
            padding: 30px 20px 20px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        nav {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        img {
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Con Vive Plus</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/houses/">Properties</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
